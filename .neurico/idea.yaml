idea:
  title: How Many Agents to Avoid Collapse?
  domain: artificial_intelligence
  hypothesis: 'Is there a minimum viable population for an LLM information ecosystem
    such that it does not collapse? Will such an ecosystem always collapse? What counts
    as different enough to be an individual in the population?

    '
  background:
    description: 'Wikipedia describes the Minimum Viable Population (MVP) as "lower
      bound on the population of a species, such that it can survive in the wild."
      Is there a minimum viable population for an LLM information ecosystem not to
      collapse? Will it always collapse? What counts as different enough to be an
      individual in the population? To be clear, this refers to an ecosystem in which
      LLMs write data and new models end up training on that data later, essentially
      birthing new LLMs.

      '
